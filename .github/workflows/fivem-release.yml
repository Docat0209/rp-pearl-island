name: FiveM Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Build + copy to fivem resource
        run: npm run build:fivem

      - name: Push fivem/pearl-island-app/ to fivem-release branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp -r fivem/pearl-island-app /tmp/fivem-resource

          git fetch origin fivem-release 2>/dev/null && \
            git checkout -f fivem-release || \
            git checkout --orphan fivem-release

          git rm -rf . --quiet
          git clean -fdx --quiet

          cp -r /tmp/fivem-resource/. .

          git add -A
          git diff --cached --quiet && echo "No changes to release" && exit 0
          git commit -m "chore: fivem release $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push origin fivem-release
